plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    compileSdk 34

    // Required by recent Android Gradle Plugin versions
    namespace "com.yourorg.photocaller"

    defaultConfig {
        applicationId "com.yourorg.photocaller"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // Capacitor Android runtime (must match the repo's Capacitor 6 runtime)
    implementation 'com.getcapacitor:capacitor-android:6.0.0'
}
